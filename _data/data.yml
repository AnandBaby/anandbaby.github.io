experiences:
    - role: Senior DevOps Engineer
      time: 2023 - Present
      company: CSG International, Bangalore
      details: |          
          - Built and managed Kubernetes infrastructure using Terraform/OpenTofu and Terragrunt, supporting 30+ microservices across multi-account, multi-region AWS environments.
          - Drove migration from EC2 to Kubernetes for production workloads, enabling GitOps-based delivery with ArgoCD and Helm, ensuring zero-downtime rollouts.
          - Architected and maintained a large-scale observability stack (VictoriaMetrics, Elasticsearch, Grafana), defining SLIs/SLOs to improve reliability, query performance and cost efficiency in AWS and Azure.
          - Strengthened the security posture of public-facing, multi-tenant services through AWS WAF, IAM hardening and secure-by-default infrastructure patterns.
          - Designed secure, scalable Kubernetes reverse proxy solutions with KEDA-based autoscaling.
          - Implemented SRE-aligned alerting and monitoring strategies across services, improving availability and reducing MTTR through actionable alerts and clear ownership.
          - Reduced cloud costs by 40% through resource optimization.

    - role: Software Engineer - System Engineering  
      time: 2022 - 2023
      company: PharmEasy, Bangalore
      details: |         
          - Scaled and operated large-scale, high-throughput production systems spanning 100+ microservices across multiple AWS accounts, including peak traffic and burst workload scenarios.
          - Developed and handled CI/CD pipelines for deployments using Jenkins and ArgoCD.
          - Delivered cloud cost optimizations, reducing monthly AWS spend by 40%.
          - Integrated DevOps practices into the SDLC through cross-team collaboration.
          - Performed EKS upgrades to ensure stability, security, and feature enhancements.
          - Automated serverless model deployments on AWS Lambda for inference workflows.
          - Hands-on experience with Akamai, Sentry, Kafka, HashiCorp Vault, ArgoCD, and Crossplane.

    - role: DevOps Cloud Engineer II
      time: 2021 - 2021
      company: omuni.com - Arvind Internet, Bangalore
      details: |         
          - Enforced security best practices across systems and environments.
          - Prepared platforms for high-traffic events through load testing, capacity planning, and performance tuning, ensuring stability during traffic spikes.
          - Managed Kubernetes clusters via KOPS, achieving 99.9% availability for ecommerce production workloads.
          - Worked with tools such as Kafka, FreeIPA, OpenVPN, and Rundeck.
          - Supported on-call responsibilities for critical microservices and monoliths, contributing to incident response, post-incident analysis, and long-term reliability improvements.
          - Analyzed and addressed security issues based on reports from Trend Micro DSM.
          - Led DevOps team, mentored members, and ensured timely project delivery.
  
    - role: DevOps Engineer II
      time: 2019 - 2021
      company: HashedIn Technologies Pvt Ltd, Bangalore
      details: |          
          - Researched and identified new technologies and tools that would improve the agile development environment.
          - Experienced in containerization using Docker and orchestration with Kubernetes.
          - Reduced cloud costs by 25% across three client environments through rightsizing and autoscaling.
          - Engineered infrastructure solutions for provisioning, monitoring, and automation, enhancing scalability and reliability.
          - Handled 2+ concurrent client engagements with 95% on-time delivery and zero critical escalations.
  
    - role: Associate Server Administrator
      time: 2017 - 2019
      company: Phases Innovation Pvt. Ltd, Cochin
      details: |
          - Troubleshot server outages and root cause analysis.
          - Administered Linux (LAMP) and Windows (IIS, MSSQL) production servers across multi-cloud environments (AWS, GCP, Linode, Xen) with Active Directory and Group Policy management.
          - Configured backup, disaster recovery, and monitoring solutions to ensure SLA compliance and high system uptime.
    
    - role: System Administrator
      time: 2016 - 2017
      company: Phoenix Cybertech Pvt. Ltd , Ernakulam
      details: |
          - Resolved high-priority incidents within SLA, maintaining 99.9% service availability.
          - Recommended system upgrades and ensured network and system security.
          - Troubleshot Windows and Linux servers and solved network-related issues (LAN, WAN, switches).
          

