career-profile:
    title: Career Profile
    summary: |
      Senior DevOps Engineer with 9+ years of experience designing, automating, and scaling multi-tenant cloud-native infrastructure on AWS and Azure. Proven track record of supporting 100+ microservices across multi-account, multi-region environments, delivering 40% cloud cost reductions, and migrating workloads to Kubernetes (EKS/AKS). Deep expertise in Terraform, Terragrunt, ArgoCD, and GitOps-driven CI/CD. Strong Site Reliability mindset reducing MTTR and securing multi-tenant environments at scale.
